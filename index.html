<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral Post Pro - Ultimate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body { background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 10px; font-family: sans-serif; }
        .controls { background: #222; padding: 15px; border-radius: 12px; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        canvas { border: 2px solid #555; background: white; max-width: 100%; height: auto; }
        button { padding: 10px; cursor: pointer; background: #FFD700; color: #000; font-weight: bold; border: none; border-radius: 4px; }
        textarea { width: 100%; padding: 5px; }
    </style>
</head>
<body>

<div class="controls">
    <input type="file" id="imgLoader">
    <textarea id="topText" placeholder="Headline (Yellow Banner)" rows="2"></textarea>
    <textarea id="bottomText" placeholder="Caption (Black Banner)" rows="3"></textarea>
    <button onclick="updateEverything()">LOCK & APPLY</button>
    <button onclick="download()" style="background: #28a745; color: white;">DOWNLOAD PNG</button>
</div>

<canvas id="c" width="800" height="1000"></canvas>

<script>
    const canvas = new fabric.Canvas('c', { width: 800, height: 1000 });

    // फिक्स्ड लेआउट
    const yellow = new fabric.Rect({ left: 0, top: 0, width: 800, height: 200, fill: '#FFFF00', selectable: false });
    const black = new fabric.Rect({ left: 0, top: 800, width: 800, height: 200, fill: '#000000', selectable: false });
    canvas.add(yellow, black);

    document.getElementById('imgLoader').onchange = function(e) {
        var reader = new FileReader();
        reader.onload = function(event) {
            fabric.Image.fromURL(event.target.result, function(img) {
                img.scaleToWidth(800);
                img.set({ top: 200, left: 0 });
                canvas.add(img);
                canvas.sendToBack(img);
                canvas.getObjects('rect').forEach(r => r.bringToFront());
                canvas.renderAll();
            });
        }
        reader.readAsDataURL(e.target.files[0]);
    };

    function updateEverything() {
        canvas.getObjects('textbox').forEach(t => canvas.remove(t));
        const top = new fabric.Textbox(document.getElementById('topText').value, { left: 400, top: 50, width: 750, fontSize: 50, fontWeight: 'bold', textAlign: 'center', originX: 'center' });
        const bot = new fabric.Textbox(document.getElementById('bottomText').value, { left: 400, top: 850, width: 750, fontSize: 35, fill: 'white', textAlign: 'center', originX: 'center' });
        canvas.add(top, bot);
    }

    function download() {
        const dataURL = canvas.toDataURL({ format: 'png', quality: 1.0 });
        const link = document.createElement('a');
        link.download = 'viral-post.png';
        link.href = dataURL;
        link.click();
    }
</script>
</body>
</html>
